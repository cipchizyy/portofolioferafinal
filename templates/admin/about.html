{% extends 'admin/base.html' %}
{% block title %}About{% endblock %}
{% block content %}

<div class="page-header">
  <h1>👤 About Section</h1>
  <p>Edit deskripsi dan playlist.</p>
</div>

<div class="card">
  <form method="POST">
    <div class="form-group">
      <label>Heading</label>
      <input type="text" name="heading" value="{{ about.heading if about else 'The Human Who Loves Database' }}"/>
    </div>
    <div class="form-group">
      <label>Deskripsi</label>
      <textarea name="description" style="min-height:140px;">{{ about.description if about else '' }}</textarea>
    </div>

    <hr style="border:none;border-top:1px solid #e5e7eb;margin:20px 0;"/>
    <p style="font-size:12px;font-weight:700;color:var(--gray);text-transform:uppercase;letter-spacing:.05em;margin-bottom:16px;">Playlist</p>

    <div class="form-grid">
      <div class="form-group">
        <label>Lagu 1 – Nama</label>
        <input type="text" name="playlist_item1_name" value="{{ about.playlist_item1_name if about else '' }}"/>
      </div>
      <div class="form-group">
        <label>Lagu 1 – Artis</label>
        <input type="text" name="playlist_item1_sub" value="{{ about.playlist_item1_sub if about else '' }}"/>
      </div>
      <div class="form-group">
        <label>Lagu 2 – Nama</label>
        <input type="text" name="playlist_item2_name" value="{{ about.playlist_item2_name if about else '' }}"/>
      </div>
      <div class="form-group">
        <label>Lagu 2 – Artis</label>
        <input type="text" name="playlist_item2_sub" value="{{ about.playlist_item2_sub if about else '' }}"/>
      </div>
    </div>
    <div class="form-group">
      <label>Spotify Playlist URL (opsional)</label>
      <input type="text" name="spotify_url" placeholder="https://open.spotify.com/playlist/..." value="{{ about.spotify_url if about else '' }}"/>
    </div>

    <div class="form-actions">
      <button type="submit" class="btn btn-primary">💾 Simpan Perubahan</button>
    </div>
  </form>
</div>

{% endblock %}
