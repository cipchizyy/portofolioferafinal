{% extends 'admin/base.html' %}
{% block title %}Edit Skill{% endblock %}
{% block content %}

<div class="page-header">
  <h1>Edit Skill</h1>
</div>

<div class="card">
  <form method="POST">
    <div class="form-grid">
      <div class="form-group">
        <label>Kategori</label>
        <select name="category">
          <option value="hard" {% if skill.category=='hard' %}selected{% endif %}>Hard Skill</option>
          <option value="mastery" {% if skill.category=='mastery' %}selected{% endif %}>Mastery Bar</option>
          <option value="soft" {% if skill.category=='soft' %}selected{% endif %}>Soft Skill</option>
          <option value="tool" {% if skill.category=='tool' %}selected{% endif %}>Tool & Tech</option>
        </select>
      </div>
      <div class="form-group">
        <label>Nama</label>
        <input type="text" name="name" value="{{ skill.name }}" required/>
      </div>
      <div class="form-group">
        <label>Level % (khusus Mastery)</label>
        <input type="number" name="level" min="0" max="100" value="{{ skill.level or '' }}"/>
      </div>
      <div class="form-group">
        <label>Icon Emoji (khusus Tool)</label>
        <input type="text" name="icon" value="{{ skill.icon or '' }}"/>
      </div>
      <div class="form-group">
        <label>Urutan</label>
        <input type="number" name="order" value="{{ skill.order }}"/>
      </div>
    </div>
    <div class="form-actions">
      <button type="submit" class="btn btn-primary">💾 Simpan</button>
      <a href="{{ url_for('admin.skills') }}" class="btn btn-ghost">Batal</a>
    </div>
  </form>
</div>

{% endblock %}
