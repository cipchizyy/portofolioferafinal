<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <title>Reset Password – Admin Panel</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet"/>
  <link href="{{ url_for('static', filename='css/auth.css') }}" rel="stylesheet"/>
</head>
<body>
  <div class="card">
    <div class="brand">
      <div class="dot">🔒</div>
      <h1>Buat Password Baru</h1>
      <p>Masukkan password baru untuk akun kamu</p>
    </div>

    {% with messages = get_flashed_messages(with_categories=true) %}
      {% for category, message in messages %}
        <div class="flash {{ 'success' if category == 'success' else '' }}">{{ message }}</div>
      {% endfor %}
    {% endwith %}

    <form method="POST">
      <div class="form-group">
        <label>Password Baru</label>
        <input type="password" name="password" placeholder="••••••••" required minlength="8" autofocus/>
        <div class="hint">Minimal 8 karakter</div>
      </div>
      <div class="form-group">
        <label>Konfirmasi Password Baru</label>
        <input type="password" name="confirm_password" placeholder="••••••••" required minlength="8"/>
      </div>
      <button type="submit" class="btn">Simpan Password Baru →</button>
    </form>

    <div class="back">
      <a href="{{ url_for('auth.login') }}">← Kembali ke Login</a>
    </div>
  </div>
</body>
</html>
