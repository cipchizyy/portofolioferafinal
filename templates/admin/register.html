<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <title>Daftar – Admin Panel</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet"/>
  <link href="{{ url_for('static', filename='css/auth.css') }}" rel="stylesheet"/>
</head>
<body>
  <div class="card">
    <div class="brand">
      <div class="dot">✦</div>
      <h1>Buat Akun Baru</h1>
      <p>Daftar untuk mengelola portfolio</p>
    </div>

    {% with messages = get_flashed_messages(with_categories=true) %}
      {% for category, message in messages %}
        <div class="flash {{ 'success' if category == 'success' else '' }}">{{ message }}</div>
      {% endfor %}
    {% endwith %}

    <form method="POST">
      <div class="form-group">
        <label>Username</label>
        <input type="text" name="username" placeholder="username kamu" required autofocus/>
      </div>
      <div class="form-group">
        <label>Email</label>
        <input type="email" name="email" placeholder="kamu@email.com" required/>
      </div>
      <div class="form-group">
        <label>Password</label>
        <input type="password" name="password" placeholder="••••••••" required minlength="8"/>
        <div class="hint">Minimal 8 karakter</div>
      </div>
      <div class="form-group">
        <label>Konfirmasi Password</label>
        <input type="password" name="confirm_password" placeholder="••••••••" required minlength="8"/>
      </div>
      <button type="submit" class="btn">Daftar →</button>
    </form>

    <div class="signup-row">
      Sudah punya akun? <a href="{{ url_for('auth.login') }}">Masuk di sini</a>
    </div>

    <div class="back">
      <a href="{{ url_for('public.index') }}">← Kembali ke Portfolio</a>
    </div>
  </div>
</body>
</html>
