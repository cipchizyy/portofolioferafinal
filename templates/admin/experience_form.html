{% extends 'admin/base.html' %}
{% block title %}{{ 'Edit' if exp else 'Tambah' }} Experience{% endblock %}
{% block content %}

<div class="page-header">
  <h1>{{ '✏️ Edit' if exp else '+ Tambah' }} Experience</h1>
</div>

<div class="card">
  <form method="POST">
    <div class="form-grid">
      <div class="form-group">
        <label>Tahun</label>
        <input type="text" name="year" placeholder="mis. 2026 atau 2024-Now" value="{{ exp.year if exp else '' }}" required/>
      </div>
      <div class="form-group">
        <label>Urutan Tampil</label>
        <input type="number" name="order" value="{{ exp.order if exp else 0 }}"/>
      </div>
    </div>
    <div class="form-group">
      <label>Jabatan / Role</label>
      <input type="text" name="role" placeholder="mis. Ketua LDKM Gelombang 1" value="{{ exp.role if exp else '' }}" required/>
    </div>
    <div class="form-group">
      <label>Organisasi / Perusahaan</label>
      <input type="text" name="company" placeholder="mis. Bidang 1 SMF FTI" value="{{ exp.company if exp else '' }}"/>
    </div>
    <div class="form-group">
      <label>Deskripsi</label>
      <textarea name="description" placeholder="Ceritakan peran dan tanggung jawabmu...">{{ exp.description if exp else '' }}</textarea>
    </div>
    <div class="form-actions">
      <button type="submit" class="btn btn-primary">💾 Simpan</button>
      <a href="{{ url_for('admin.experiences') }}" class="btn btn-ghost">Batal</a>
    </div>
  </form>
</div>

{% endblock %}
