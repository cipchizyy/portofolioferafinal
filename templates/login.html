<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <title>Login – Admin Panel</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet"/>
  <link href="{{ url_for('static', filename='css/auth.css') }}" rel="stylesheet"/>
</head>
<body>
  <div class="card">
    <div class="brand">
      <div class="dot">⚡</div>
      <h1>Admin Login</h1>
      <p>Masuk untuk mengelola portfolio</p>
    </div>

    {% with messages = get_flashed_messages(with_categories=true) %}
      {% for category, message in messages %}
        <div class="flash {{ 'success' if category == 'success' else '' }}">{{ message }}</div>
      {% endfor %}
    {% endwith %}

    <form method="POST">
      <div class="form-group">
        <label>Username</label>
        <input type="text" name="username" placeholder="admin" required autofocus/>
      </div>
      <div class="form-group">
        <label>Password</label>
        <input type="password" name="password" placeholder="••••••••" required/>
      </div>
      <div class="form-extra">
        <span></span>
        <a href="{{ url_for('auth.forgot_password') }}">Lupa password?</a>
      </div>
      <button type="submit" class="btn">Masuk →</button>
    </form>

    <div class="signup-row">
      Belum punya akun? <a href="{{ url_for('auth.register') }}">Daftar di sini</a>
    </div>

    <div class="back">
      <a href="{{ url_for('public.index') }}">← Kembali ke Portfolio</a>
    </div>
  </div>
</body>
</html>
